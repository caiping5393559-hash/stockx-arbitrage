services:
  - type: web
    name: stockx-goat-scanner
    runtime: docker
    plan: starter
    autoDeploy: false
    healthCheckPath: /_stcore/health
    disk:
      name: stockx-goat-data
      mountPath: /app/data
      sizeGB: 10
    envVars:
      - key: APP_LOGIN_ENABLED
        value: "true"
      - key: APP_USERNAME
        sync: false
      - key: APP_PASSWORD
        sync: false
      - key: CLOUD_STORAGE_BACKEND
        value: firebase
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_COLLECTION_PREFIX
        value: stockx_goat
      - key: FIREBASE_SERVICE_ACCOUNT_B64
        sync: false
      - key: STOCKX_HOST
        value: http://43.136.43.128:61030/api/stockx
      - key: STOCKX_TOKEN
        sync: false
      - key: STOCKX_AUTH
        sync: false
      - key: STOCKX_CREDENTIAL_MODE
        value: both
      - key: STOCKX_DB_PATH
        value: /app/data/stockx_arbitrage.sqlite
      - key: ESTIMATED_SELLER_FEE_RATE
        value: "0.03"
      - key: BUY_DEPTH_SALES_FRACTION
        value: "0.75"
      - key: AUTO_FULL_SYNC_ENABLED
        value: "true"
      - key: AUTO_FULL_SYNC_INTERVAL_MINUTES
        value: "60"
      - key: SYNC_MAX_WORKERS
        value: "4"
